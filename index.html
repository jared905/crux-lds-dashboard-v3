<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Full_View_favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet" />
    <title>Full View Analytics || Crux</title>
    <meta name="version" content="2.2.1-cache-bust" />
    <style>
      /* CRUX brand fonts — self-hosted from /public/fonts. Each face
         tries .woff2 first (best compression, modern browsers) then
         .otf as a fallback. If you only have one format, leave the
         other line — the browser just skips the missing file. */
      @font-face {
        font-family: 'Gotham Book';
        src: url('/fonts/Gotham-Book.woff2') format('woff2'),
             url('/fonts/Gotham-Book.otf') format('opentype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Gotham Ultra';
        src: url('/fonts/Gotham-Ultra.woff2') format('woff2'),
             url('/fonts/Gotham-Ultra.otf') format('opentype');
        font-weight: 900;
        font-style: normal;
        font-display: swap;
      }

      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: #181817;
        position: relative;
        overflow-x: hidden;
      }
    </style>
  </head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
